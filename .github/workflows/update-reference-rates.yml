name: Update reference rates data

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1-5'

permissions:
  contents: write

jobs:
  update-reference-rates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update TR Bacen JSON
        run: node scripts/update-tr-bacen.mjs

      - name: Update Selic BCB JSON
        run: node scripts/update-selic-bcb.mjs

      - name: Commit changes
        run: |
          if [ -z "$(git status --porcelain -- assets/data/tr-bacen.json assets/data/selic-bcb.json)" ]; then
            echo "Reference rates data is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/data/tr-bacen.json assets/data/selic-bcb.json
          git commit -m "chore: update reference rates data"
          git push
